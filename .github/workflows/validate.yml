name: Validate repository

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install validators
        run: sudo apt-get update && sudo apt-get install -y jq shellcheck

      - name: Validate
        run: bash install_scripts/validate_repo.sh
