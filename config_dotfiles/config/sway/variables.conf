# ==========================================================
# Mod key
# ==========================================================
set $mod Mod4

# ==========================================================
# Workspaces
# ==========================================================
set $ws1 "1"
set $ws2 "2"
set $ws3 "3"
set $ws4 "4"
set $ws5 "5"
set $ws6 "6"
set $ws7 "7"
set $ws8 "8"

# ==========================================================
# Theme colors
# ==========================================================
set $bg #222222
set $fg #d8a657
set $ur #ea6962
set $uf #a89984

# ==========================================================
# Default applications
# ==========================================================
set $terminal footclient
set $browser firefox --new-tab
set $incognito $browser --new-tab --private-window
set $filemanager pcmanfm
set $pdfreader zathura
set $audio_settings pavucontrol
set $blueman blueman-manager

# ==========================================================
# Launchers
# ==========================================================
set $launcher wofi --show drun
set $run wofi --show run

# ==========================================================
# Session & lock
# ==========================================================
set $lockscreen swaylock -f -i ~/.config/walls/lock.png
set $wlsunset ~/.config/custom_scripts/wlsunset.sh

# ==========================================================
# Media & file browsing
# ==========================================================
set $musicplayer ~/.config/custom_scripts/launch_tui.sh cmus
set $backgrounds ~/.config/custom_scripts/launch_tui.sh lf "$HOME/Pictures/backgrounds"

# ==========================================================
# Waybar & wallpapers
# ==========================================================
set $chooseBackground ~/.config/custom_scripts/chooseBackgroundImage.sh
set $waybarThemeSwitcher ~/.config/custom_scripts/waybarThemeSwitcher.sh

# ==========================================================
# Utility scripts
# ==========================================================
set $window_switch ~/.config/custom_scripts/window-switcher.sh
set $emoji ~/.config/custom_scripts/emoji.sh
set $executables ~/.config/custom_scripts/executeScripts.sh
set $powermenu ~/.config/custom_scripts/power.sh

# ==========================================================
# Bookmarks
# ==========================================================
set $bookmarks ~/.config/custom_scripts/bookmarks.sh tab all
set $bookmarks_window ~/.config/custom_scripts/bookmarks.sh window all
set $bookmarks_private ~/.config/custom_scripts/bookmarks.sh private all
set $bookmarks_category ~/.config/custom_scripts/bookmarks.sh tab category

# ==========================================================
# Screenshots
# ==========================================================
set $full_screenshot grim ~/Pictures/screenshots/$(date +'%Y-%m-%d_%H-%M-%S.png') && notify-send -e "Screenshot taken"
set $edit_screenshot grim - | swappy -f -
