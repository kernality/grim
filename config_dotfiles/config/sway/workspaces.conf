# ==========================================================
# Workspace assignments
# ==========================================================

# Workspace 1 — Terminal
assign [app_id="(?i)foot"] $ws1

# Workspace 2 — Web browser
assign [app_id="(?i)firefox"] $ws2

# Workspace 3 — Development & Databases
assign [app_id="(?i)postman|mongodb|beekeeper|pgadmin"] $ws3
assign [class="(?i)postman|mongodb|beekeeper|pgadmin"]  $ws3

# Workspace 4 — File Manager
assign [app_id="(?i)pcmanfm"] $ws4

# Workspace 5 — Communication
assign [app_id="(?i)telegram|vesktop|discord"] $ws5
assign [class="(?i)telegram|vesktop|discord"]  $ws5

# Workspace 6 — Graphics
assign [app_id="(?i)gimp|inkscape"] $ws6
assign [class="(?i)gimp|inkscape"]  $ws6

# Workspace 7 — Documents & PDFs
assign [app_id="(?i)libreoffice|soffice|zathura"] $ws7
assign [class="(?i)libreoffice|soffice"]          $ws7

# Workspace 8 — Utilities & Virtualization
assign [app_id="(?i)qbittorrent|localsend|virt-manager"] $ws8
assign [class="(?i)qbittorrent|localsend"]               $ws8

# ==========================================================
# Workspace layout
# ==========================================================

workspace_layout default
